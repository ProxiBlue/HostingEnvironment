[PHP]
; Security hardening
expose_php = Off
allow_url_include = Off
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Disable dangerous functions in FPM context
; Note: CLI is unaffected as this is loaded via php.d for all SAPIs
; proc_open and popen are required by Composer and setup:di:compile
disable_functions = passthru

; Restrict PHP file access to Magento root, tmp, composer cache, and PHP binary path
open_basedir = /var/www/webroot/ROOT:/tmp:/var/www/webroot/site_report:/var/lib/nginx/.composer:/usr/lib64/jelastic_php

; Performance - important for Magento's deep directory tree
realpath_cache_size = 10M
realpath_cache_ttl = 7200
max_input_vars = 75000
