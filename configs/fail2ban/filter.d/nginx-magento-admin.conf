[Definition]

# Detect repeated POST attempts to Magento admin login
# Catches brute-force attacks against the admin panel
failregex = ^<HOST> -.*"POST.*/admin/auth/login.*HTTP.*" (401|403)
            ^<HOST> -.*"POST.*/admin/auth/login.*HTTP.*" 200.*
            ^<HOST> -.*"POST.*/customer/account/loginPost.*HTTP.*" (401|403)

ignoreregex =
